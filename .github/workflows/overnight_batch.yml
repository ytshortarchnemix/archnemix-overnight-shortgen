name: ArchNemix Overnight Batch
on:
  push:
    paths:
      - 'Videos/**'
  schedule:
    - cron: '0 * * * *'
concurrency:
  group: batch-processor
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.CR_USER }}
          password: ${{ secrets.CR_PAT }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Find ready batch
        id: find_batch
        run: |
          BATCH_DIR=""
          BATCH_NAME=""
          NOW=$(date +%s)
          if [ -d "Videos" ]; then
            for batch in $(ls -d Videos/batch* 2>/dev/null | sort); do
              JOB_COUNT=$(find "$batch" -mindepth 1 -maxdepth 1 -type d | wc -l)
              META="$batch/batch_meta.json"
              if [ -f "$META" ]; then
                CREATED_AT=$(python3 -c "import json; d=json.load(open('$META')); print(int(d.get('created_at', 0)))" 2>/dev/null || echo 0)
              else
                CREATED_AT=0
              fi
              AGE=$(( NOW - CREATED_AT ))
              echo "Batch: $batch | Jobs: $JOB_COUNT | Age: ${AGE}s"
              if [ "$JOB_COUNT" -ge 5 ] || ( [ "$AGE" -ge 3600 ] && [ "$JOB_COUNT" -ge 1 ] ); then
                BATCH_DIR="$(pwd)/$batch"
                BATCH_NAME=$(basename "$batch")
                echo "Selected: $BATCH_NAME ($JOB_COUNT jobs, age ${AGE}s)"
                break
              fi
            done
          fi
          echo "batch_dir=$BATCH_DIR" >> $GITHUB_OUTPUT
          echo "batch_name=$BATCH_NAME" >> $GITHUB_OUTPUT

      - name: Skip if no batch ready
        if: steps.find_batch.outputs.batch_dir == ''
        run: |
          echo "No batch ready yet — exiting cleanly."
          exit 0

      - name: Download background videos
        if: steps.find_batch.outputs.batch_dir != ''
        run: |
          pip install huggingface_hub --quiet
          python3 << 'EOF'
          import json, os, glob, shutil
          from huggingface_hub import hf_hub_download

          token      = "${{ secrets.HF_TOKEN_RE }}"
          repo       = "${{ secrets.VID_REPO }}"
          batch_name = "${{ steps.find_batch.outputs.batch_name }}"
          manifests  = glob.glob(f"Videos/{batch_name}/*/manifest.json")

          # Normalize old-style names to mc naming scheme
          bg_name_map = {
              "minecraft_1.mp4": "mc1.mp4",
              "minecraft_2.mp4": "mc2.mp4",
              "minecraft_3.mp4": "mc3.mp4",
              "minecraft_4.mp4": "mc4.mp4",
              "minecraft_5.mp4": "mc5.mp4",
              "minecraft_6.mp4": "mc6.mp4",
          }

          backgrounds_needed = set()
          for m in manifests:
              try:
                  data   = json.load(open(m))
                  bg_raw = data.get("background", "mc1.mp4")
                  bg     = bg_name_map.get(bg_raw, bg_raw)
                  backgrounds_needed.add(bg)
              except Exception as e:
                  print(f"Could not read {m}: {e}")

          print(f"Backgrounds needed: {backgrounds_needed}")
          os.makedirs("backgrounds", exist_ok=True)

          for bg in backgrounds_needed:
              print(f"Downloading minecraft/{bg} from {repo}...")
              hf_hub_download(
                  repo_id=repo,
                  filename=f"minecraft/{bg}",
                  repo_type="dataset",
                  token=token,
                  local_dir="backgrounds",
              )
              src = f"backgrounds/minecraft/{bg}"
              dst = f"backgrounds/{bg}"
              if os.path.exists(src):
                  shutil.move(src, dst)
                  print(f"  Moved to {dst}")
              print(f"  Done: {bg}")

          # Clean up empty minecraft subdir
          mc_dir = "backgrounds/minecraft"
          if os.path.isdir(mc_dir) and not os.listdir(mc_dir):
              os.rmdir(mc_dir)

          print(f"All backgrounds ready: {os.listdir('backgrounds')}")
          EOF

      - name: Run pipeline
        if: steps.find_batch.outputs.batch_dir != ''
        run: |
          docker run --rm \
            -e HF_TOKEN_WR="${{ secrets.HF_TOKEN_WR }}" \
            -e HF_TOKEN_RE="${{ secrets.HF_TOKEN_RE }}" \
            -e GITHUB_TOKEN="${{ secrets.GH_PAT }}" \
            -e GH_REPO="${{ github.repository }}" \
            -e HF_DATASET_REPO="${{ secrets.HF_DATASET_REPO }}" \
            -e BATCH_DIR="/workspace/Videos/${{ steps.find_batch.outputs.batch_name }}" \
            -v ${{ github.workspace }}/Videos:/workspace/Videos \
            -v ${{ github.workspace }}/backgrounds:/workspace/backgrounds \
            ghcr.io/${{ secrets.CR_USER }}/archnemix-shortgen-core-reddit:latest
