name: ArchNemix Overnight Batch

on:
  push:
    paths:
      - 'Videos/**'
  schedule:
    - cron: '0 * * * *'

concurrency:
  group: batch-processor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.CR_USER }}
          password: ${{ secrets.CR_PAT }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Run pipeline
        run: |
          docker run --rm \
            -e HF_TOKEN_WR="${{ secrets.HF_TOKEN_WR }}" \
            -e HF_TOKEN_RE="${{ secrets.HF_TOKEN_RE }}" \
            -e GITHUB_TOKEN="${{ secrets.GH_PAT }}" \
            -e GH_REPO="${{ github.repository }}" \
            -e HF_DATASET_REPO="${{ secrets.HF_DATASET_REPO }}" \
            -e APP_KEY="${{ secrets.APP_KEY }}" \
            -v ${{ github.workspace }}/Videos:/workspace/Videos \
            -v ${{ github.workspace }}/backgrounds:/workspace/backgrounds \
            ghcr.io/${{ secrets.CR_USER }}/archnemix-shortgen-core-reddit:latest
